<html>
<head>
    <title>User Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <h2>User Login</h2>
        <form method="post" action="login1">
            <div class="form-group">
                <label>Email ID:</label>
                <input type="text" name="l1" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="l2" required>
            </div>
            <div class="btn-group">
                <input type="submit" value="Login" class="btn btn-primary">
                <input type="reset" value="Reset" class="btn btn-danger">
            </div>
        </form>
        
        <!-- Forgot Password Link -->
        <a href="ForgetPassword.html" class="forgot-link">Forgot Password?</a><br>
        
        <!-- ✅ New Registration Link -->
        <a href="Register.html" class="register-link">New User? Register Here</a><br>

        <!-- ✅ Admin Login Link -->
        <a href="adminlogin.html" class="admin-link">Admin Login</a>
    </div>
</body>
</html>
