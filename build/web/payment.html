<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; text-align:center; }
        form { background:#fff; padding:20px; margin:40px auto; width:50%; border-radius:10px; box-shadow:0px 0px 10px gray; }
        input, select { padding:10px; margin:10px; width:80%; }
        button { padding:10px 20px; background:green; color:white; border:none; border-radius:5px; cursor:pointer; }
        button:hover { background:darkgreen; }
    </style>
</head>
<body>
    <h2>Complete Your Payment</h2>
    <form action="ConfirmBooking" method="post">

        <!-- ✅ Hidden fields (yeh flight select karte waqt fill karo dynamically) -->
        <input type="hidden" name="flight_id" value="102">
        <input type="hidden" name="passenger_name" value="Banti">
        <input type="hidden" name="passenger_email" value="shawbanti098@gmail.com">
        <input type="hidden" name="passenger_phone" value="7864905379">
        <input type="hidden" name="num_passengers" value="4">
        <input type="hidden" name="total_amount" value="36000">

        <label>Payment Method:</label><br>
        <select name="payment_method" required>
            <option value="CARD">Card</option>
            <option value="UPI">UPI</option>
            <option value="NETBANKING">NetBanking</option>
        </select><br>

        <label>Enter Reference ID (Card/UPI/Bank Txn):</label><br>
        <input type="text" name="transaction_id" required><br>

        <button type="submit">Pay Now</button>
    </form>
</body>
</html>
