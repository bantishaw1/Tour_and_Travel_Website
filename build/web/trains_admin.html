<!DOCTYPE html>
<html>
<head>
    <title>Admin Train Dashboard</title>
    <link rel="stylesheet" href="flights_admin.css">
    <style>
        /* Back button style */
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .back-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <a href="admindashboard.html" class="back-btn">Back to Dashboard</a>

    <h2>Admin Train Dashboard</h2>
    <div class="table-container">
        <!-- ✅ Dynamic data from AllTrains servlet -->
        <iframe src="AllTrains" style="width:100%; height:400px; border:none;"></iframe>
    </div>

    <h3>Add New Train</h3>
    <div class="form-container">
        <form action="addtrains" method="post">
            <label>Train ID:</label>
            <input type="text" name="train_id" required>

            <label>Train Name:</label>
            <input type="text" name="train_name" required>

            <label>Source:</label>
            <input type="text" name="source" required>

            <label>Destination:</label>
            <input type="text" name="destination" required>

            <label>Travel Date:</label>
            <input type="date" name="travel_date" required>

            <label>Price:</label>
            <input type="number" name="price" required>

            <label>Seats Available:</label>
            <input type="number" name="seats_available" required>

            <button type="submit">Add Train</button>
        </form>
    </div>

    <h3>Update Existing Train</h3>
    <div class="form-container">
        <form action="updatetrains" method="post">
            <label>Train ID (Existing):</label>
            <input type="text" name="train_id" required>

            <label>Train Name:</label>
            <input type="text" name="train_name">

            <label>Source:</label>
            <input type="text" name="source">

            <label>Destination:</label>
            <input type="text" name="destination">

            <label>Travel Date:</label>
            <input type="date" name="travel_date">

            <label>Price:</label>
            <input type="number" name="price">

            <label>Seats Available:</label>
            <input type="number" name="seats_available">

            <button type="submit">Update Train</button>
        </form>
    </div>

</body>
</html>
